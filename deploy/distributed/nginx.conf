events {}

http {
  # ip_hash keeps a given client pinned to one instance so the in-memory
  # session store stays consistent, while different clients still spread across
  # both instances. Job/lock coordination goes through Postgres + Redis, so the
  # two instances stay consistent regardless of which one serves a request.
  upstream app {
    ip_hash;
    server app1:8080;
    server app2:8080;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
