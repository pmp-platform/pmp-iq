# PlatIQ — example configuration file.
#
# Copy to `config.yaml` next to the binary (or pass `--config-file <path>`).
# The file is OPTIONAL: with no file present the app uses environment variables
# and built-in defaults. Every value can pull from the environment with
# `${VAR}` or `${VAR:-default}`. Precedence is: process env var > file > default.

server:
  bind_address: 0.0.0.0
  port: 8080
  assets_dir: assets

database:
  # Engine is inferred from the URL scheme: postgres:// → Postgres, else SQLite.
  url: "${DATABASE_URL:-sqlite://platiq.db?mode=rwc}"
  max_connections: 10

# Redis is disabled by default. Enable it to back the distributed lock across
# multiple app instances (otherwise the SQL-backed lock is used).
redis:
  enabled: false
  url: "${REDIS_URL:-redis://localhost:6379}"

auth:
  provider: admin            # admin (default) | github
  admin_user: "${ADMIN_USER:-admin}"
  admin_pass: "${ADMIN_PASS}"        # leave unset to auto-generate at boot
  session_secret: "${SESSION_SECRET}"
  encryption_key: "${ENCRYPTION_KEY}"  # base64, 32 bytes once decoded
  # github:                  # used when provider: github (see milestone 21)
  #   mode: oauth_app        # oauth_app | personal_token
  #   client_id: "${GITHUB_CLIENT_ID}"
  #   client_secret: "${GITHUB_CLIENT_SECRET}"
  #   redirect_url: "http://localhost:8080/auth/github/callback"
  #   allowed_orgs: ["my-org"]
  #   allowed_logins: ["alice"]

log:
  level: info                # RUST_LOG still wins when set

agent:
  # Max AI-Agent turns that run in parallel (per-repo locks still serialise
  # same-repo work). Default 4.
  max_concurrency: 4

webhooks:
  # Shared secret for verifying GitHub webhook signatures (X-Hub-Signature-256).
  # When unset, signature verification is skipped (development only).
  github_secret: "${WEBHOOK_GITHUB_SECRET}"

workspace_dir: tmp/workspace
git_min_interval_ms: 250
