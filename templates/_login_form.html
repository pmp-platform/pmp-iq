<form method="post" action="/login" class="space-y-3 mt-2">
  <input type="hidden" name="csrf" value="{{ csrf }}" />
  <div>
    <label class="block text-sm mb-1" for="username">
      {% if auth_provider == "github" %}GitHub username{% else %}Username{% endif %}
    </label>
    <input id="username" name="username" class="w-full border rounded px-3 py-2" autofocus />
  </div>
  <div>
    <label class="block text-sm mb-1" for="password">
      {% if auth_provider == "github" %}Personal access token{% else %}Password{% endif %}
    </label>
    <input id="password" name="password" type="password" class="w-full border rounded px-3 py-2" />
  </div>
  <button class="w-full bg-blue-100 text-blue-700 rounded py-1.5 text-sm font-medium hover:bg-blue-200">Sign in</button>
</form>
