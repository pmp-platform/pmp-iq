{% extends "base.html" %}
{% block title %}Graph · Platform Inspector{% endblock %}
{% block content %}
<a href="/platform" class="text-sm text-blue-600">&larr; Platform</a>
<div class="flex items-center justify-between my-3">
  <h1 class="text-2xl font-bold">Connection graph</h1>
  <div class="flex items-center gap-3 text-sm">
    <label class="flex items-center gap-1"><input type="checkbox" id="show-infra" checked /> Infrastructure</label>
    <span id="graph-notice" class="text-amber-600"></span>
  </div>
</div>

<div class="flex gap-4 text-xs mb-2 text-slate-500">
  <span><span class="inline-block w-3 h-3 rounded-full" style="background:#2563eb"></span> application</span>
  <span><span class="inline-block w-3 h-3 rounded-full" style="background:#059669"></span> infrastructure</span>
  <span><span class="inline-block w-3 h-3 rounded-full" style="background:#9ca3af"></span> external</span>
</div>

<div id="cy" class="bg-white rounded-lg shadow border border-slate-200" style="height:600px"></div>

<script src="/assets/vendor/cytoscape.min.js?v={{ asset_version }}"></script>
<script src="/assets/platform-graph.js?v={{ asset_version }}" defer></script>
{% endblock %}
