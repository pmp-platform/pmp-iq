{% extends "base.html" %}
{% block title %}Graph · pmp-iq{% endblock %}
{% block content %}
{% include "_platform_tabs.html" %}
<div class="flex items-center justify-between my-3">
  <h1 class="text-2xl font-bold">Connection graph</h1>
  <div class="flex items-center gap-3 text-sm">
    <div id="graph-toggles" class="flex flex-wrap items-center gap-3"></div>
    <span id="graph-notice" class="text-amber-600"></span>
  </div>
</div>

<div class="bg-white rounded-lg shadow border border-slate-200 p-3 mb-3">
  <div class="flex items-center gap-2">
    <input id="platform-ask-input" class="flex-1 border border-slate-300 rounded px-2 py-1 text-sm"
      placeholder="Ask the platform… e.g. which applications depend on Kafka?" />
    <button id="platform-ask-btn" type="button"
      class="btn btn-primary">Ask</button>
  </div>
  <div id="platform-ask-answer" class="md-body text-sm mt-2"></div>
  <div class="flex items-center gap-2 mt-3 pt-3 border-t border-slate-100">
    <input id="sem-search-input" class="flex-1 border border-slate-300 rounded px-2 py-1 text-sm"
      placeholder="Semantic search… e.g. apps that send email" />
    <button id="sem-search-btn" type="button"
      class="btn btn-secondary">Search</button>
  </div>
  <div id="sem-search-results" class="text-sm mt-2"></div>
</div>

<div id="graph-legend" class="flex flex-wrap gap-4 text-xs mb-2 text-slate-500"></div>

<div id="cy" class="bg-white rounded-lg shadow border border-slate-200" style="height:600px"></div>

<script src="/assets/vendor/g6.min.js?v={{ asset_version }}"></script>
<script src="/assets/vendor/marked.min.js?v={{ asset_version }}" defer></script>
<script src="/assets/platform-graph.js?v={{ asset_version }}" defer></script>
<script src="/assets/platform-ask.js?v={{ asset_version }}" defer></script>
<script src="/assets/semantic.js?v={{ asset_version }}" defer></script>
{% endblock %}
