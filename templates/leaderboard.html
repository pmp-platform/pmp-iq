{% extends "base.html" %}
{% block title %}Leaderboard · pmp-iq{% endblock %}
{% block content %}
{% include "_platform_tabs.html" %}
<h1 class="text-2xl font-bold my-3">Leaderboard</h1>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
  <div class="bg-white rounded-lg shadow border border-slate-200 p-4">
    <div class="font-semibold text-sm mb-2">Your profile</div>
    <div id="my-profile" class="text-sm text-slate-500">Loading…</div>
  </div>
  <div class="bg-white rounded-lg shadow border border-slate-200 p-4">
    <div class="flex items-center justify-between mb-2">
      <div class="font-semibold text-sm">Top operators</div>
      <button id="gam-replay" class="text-xs text-blue-600 hover:underline">Refresh awards</button>
    </div>
    <table class="w-full text-sm">
      <thead class="text-left text-slate-500 border-b"><tr><th class="p-1.5">Operator</th><th>Level</th><th>XP</th></tr></thead>
      <tbody id="leaderboard-rows"></tbody>
    </table>
  </div>
</div>

<script src="/assets/gamification.js?v={{ asset_version }}" defer></script>
{% endblock %}
