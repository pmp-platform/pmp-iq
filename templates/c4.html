{% extends "base.html" %}
{% block title %}C4 · PlatIQ{% endblock %}
{% block content %}
{% include "_platform_tabs.html" %}
<h1 class="text-2xl font-bold my-3">C4 model</h1>

<div class="bg-white rounded-lg shadow border border-slate-200 p-3 mb-3">
  <div class="text-sm font-semibold mb-2">System context</div>
  <div id="c4-diagram" class="overflow-auto text-sm text-slate-500">Loading…</div>
</div>

<div class="bg-white rounded-lg shadow border border-slate-200 p-3">
  <div class="flex items-center justify-between mb-2">
    <div class="text-sm font-semibold">Structurizr DSL</div>
    <button id="c4-copy" type="button" class="text-xs text-blue-600 hover:underline">Copy</button>
  </div>
  <textarea id="c4-dsl" rows="12" readonly
    class="w-full border border-slate-200 rounded p-2 text-xs font-mono"></textarea>
</div>

<script src="/assets/vendor/mermaid.min.js?v={{ asset_version }}"></script>
<script src="/assets/platform-c4.js?v={{ asset_version }}" defer></script>
{% endblock %}
