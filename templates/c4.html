{% extends "base.html" %}
{% block title %}C4 · pmp-iq{% endblock %}
{% block content %}
{% include "_platform_tabs.html" %}
<h1 class="text-2xl font-bold my-3">C4 model</h1>

<div class="bg-white rounded-lg shadow border border-slate-200 p-3 mb-3">
  <div class="flex flex-wrap items-center justify-between gap-2 mb-2">
    <div class="flex items-center gap-2 text-sm">
      <span class="font-semibold">Level</span>
      <select id="c4-level" class="border border-slate-200 rounded text-xs p-1">
        <option value="context">Context (fleet)</option>
        <option value="container">Container (one app)</option>
        <option value="component">Component (one app)</option>
      </select>
      <select id="c4-app" class="border border-slate-200 rounded text-xs p-1 hidden">
        <option value="">Select an application…</option>
      </select>
    </div>
    <label class="flex items-center gap-2 text-xs text-slate-600">
      <input type="checkbox" id="c4-deps" /> Include dependencies (infrastructure, services, external…)
    </label>
  </div>
  <div id="c4-diagram" class="overflow-auto text-sm text-slate-500">Loading…</div>
</div>

<div class="bg-white rounded-lg shadow border border-slate-200 p-3">
  <div class="flex items-center justify-between mb-2">
    <div class="text-sm font-semibold">Structurizr DSL</div>
    <button id="c4-copy" type="button" class="text-xs text-blue-600 hover:underline">Copy</button>
  </div>
  <textarea id="c4-dsl" rows="12" readonly
    class="w-full border border-slate-200 rounded p-2 text-xs font-mono"></textarea>
</div>

<script src="/assets/vendor/mermaid.min.js?v={{ asset_version }}"></script>
<script src="/assets/platform-c4.js?v={{ asset_version }}" defer></script>
{% endblock %}
