{% extends "base.html" %}
{% block title %}Audit · pmp-iq{% endblock %}
{% block content %}
{% include "_platform_tabs.html" %}
<h1 class="text-2xl font-bold my-3">Audit log</h1>
<p class="text-slate-500 text-sm mb-3">Mutating operator actions (logins, settings/prompt edits, job runs, …). Admin only.</p>

<table class="w-full bg-white rounded-lg shadow border border-slate-200 text-sm">
  <thead class="text-left text-slate-500 border-b">
    <tr><th class="p-2.5">When</th><th>Actor</th><th>Action</th><th>Target</th></tr>
  </thead>
  <tbody id="audit-rows"></tbody>
</table>

<h2 class="text-xl font-bold mt-6 mb-3">Recent platform changes</h2>
<div id="global-timeline" class="bg-white rounded-lg shadow border border-slate-200 p-3 text-sm"></div>

<script src="/assets/timeline.js?v={{ asset_version }}" defer></script>
{% endblock %}
