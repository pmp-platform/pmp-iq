{% extends "base.html" %}
{% block title %}Platform · Platform Inspector{% endblock %}

<p class="text-slate-600 mb-6">Everything discovered by the review jobs.</p>

<div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
  <a href="/platform/graph" class="block p-5 bg-white rounded-lg shadow hover:shadow-md border border-slate-200">

  <a href="/platform/applications" class="block p-5 bg-white rounded-lg shadow hover:shadow-md border border-slate-200">

  </a>
  <a href="/platform/users" class="block p-5 bg-white rounded-lg shadow hover:shadow-md border border-slate-200">
    <div class="text-lg font-semibold">Users</div>
  </a>
  <a href="/platform/groups" class="block p-5 bg-white rounded-lg shadow hover:shadow-md border border-slate-200">
