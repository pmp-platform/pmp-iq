<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}pmp-iq{% endblock %}</title>
  <script src="/assets/vendor/tailwind.js?v={{ asset_version }}"></script>
  <script src="/assets/vendor/jquery.min.js?v={{ asset_version }}"></script>
  <script src="/assets/app.js?v={{ asset_version }}" defer></script>
  <style>
    /* Shared button component. Gives real button affordance (solid fills,
       weight, subtle depth, focus ring, active press, disabled state) instead
       of the flat tinted "badge" look. Works on <button> and <a>. */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.4rem 0.8rem;
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: 1.1;
      border-radius: 0.375rem;
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      text-decoration: none;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      transition: background-color 0.15s ease, border-color 0.15s ease,
        color 0.15s ease, box-shadow 0.15s ease, transform 0.05s ease;
    }
    .btn:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px rgba(59, 130, 246, 0.55);
    }
    .btn:active:not(:disabled) { transform: translateY(0.5px); }
    .btn:disabled,
    .btn[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }
    /* Sizes */
    .btn-sm { padding: 0.25rem 0.55rem; font-size: 0.75rem; border-radius: 0.3125rem; }
    .btn-lg { padding: 0.55rem 1rem; font-size: 0.875rem; }
    /* Variants */
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #334155; border-color: #cbd5e1; }
    .btn-secondary:hover:not(:disabled) { background: #f8fafc; border-color: #94a3b8; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #b91c1c; }
    .btn-success { background: #059669; color: #fff; }
    .btn-success:hover:not(:disabled) { background: #047857; }
    .btn-ghost { background: transparent; color: #475569; box-shadow: none; }
    .btn-ghost:hover:not(:disabled) { background: #f1f5f9; }
  </style>
</head>
<body class="bg-slate-50 text-slate-700 text-[13px] min-h-screen">
  <div class="flex min-h-screen">
    {% if current_user %}
    <aside id="sidebar" class="w-52 shrink-0 bg-slate-900 text-slate-300 flex flex-col">
      <a href="/" class="px-4 h-12 flex items-center font-semibold text-white border-b border-slate-800">
        Platform&nbsp;IQ
      </a>
      <nav class="flex-1 p-2 space-y-1">
        <a href="/platform" data-nav="platform" class="block px-3 py-2 rounded hover:bg-slate-800">Platform</a>
        <div class="my-2 border-t border-slate-800"></div>
        <a href="/jobs" data-nav="jobs" class="block px-3 py-2 rounded hover:bg-slate-800">Jobs</a>
        <a href="/settings" data-nav="settings" class="block px-3 py-2 rounded hover:bg-slate-800">Settings</a>
      </nav>
      <div class="p-3 border-t border-slate-800 flex items-center justify-between gap-2">
        <span class="text-slate-400 truncate">{{ current_user }}</span>
        <form method="post" action="/logout" id="logout-form">
          <button type="button" id="logout-btn" class="px-2 py-1 rounded bg-slate-800 hover:bg-slate-700">Logout</button>
        </form>
      </div>
    </aside>
    {% endif %}

    <main class="flex-1 px-6 py-6 {% if not current_user %}flex items-center justify-center{% endif %}" data-active="{{ active_nav }}">
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
